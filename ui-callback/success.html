<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VoreVault — Signed in</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #f5e9c8;
      color: #2a2520;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fffaf0;
      border: 2.5px solid #2a2520;
      border-radius: 12px;
      box-shadow: 6px 6px 0 #2a2520;
      padding: 32px 40px;
      text-align: center;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 20px;
      font-size: 15px;
      line-height: 1.5;
      color: #4a4035;
    }
    .link {
      display: inline-block;
      padding: 8px 20px;
      background: #2a2520;
      color: #fffaf0;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .link:hover {
      background: #4a4035;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Signed in to VoreVault</h1>
    <p>You can close this tab. The VoreVault app is now signed in.</p>
    <a class="link" href="https://vault.bullmoosefn.com">Open VoreVault</a>
  </div>
</body>
</html>
